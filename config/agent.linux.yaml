agent:
  name: "Yi Min"
  workspace_dir: "../workspace"
  max_iterations: 8

providers:
  config_file: "providers.yaml"
  default_primary: "qwen"

tools:
  shell:
    enabled: true
    requires_confirmation: true

mflow:
  enabled: false
  dataset_name: "workspace"
  llm_provider_name: "qwen"
  embedding:
    provider_name: "qwen"
    model: "text-embedding-v4"
    # DashScope text-embedding-v4 defaults to 1024 dims and allows at most 10
    # inputs per batch. If you change dimensions later, rebuild the corresponding
    # workspace's `mflow_data/` to keep vector schema consistent.
    dimensions: 1024
    batch_size: 10

channels:
  instances:
    - name: "feishu"
      type: "feishu"
      workspace_dir: "../workspace"
      app_id_env: "FEISHU_APP_ID"
      app_secret_env: "FEISHU_APP_SECRET"
