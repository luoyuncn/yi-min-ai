agent:
  name: "Yi Min"
  max_iterations: 8

providers:
  config_file: "providers.yaml"
  default_primary: "qwen"

# Optional M-flow runtime config.
# If omitted, M-flow still tries to use the primary provider for LLM,
# but embedding should be configured explicitly for production use.
#
mflow:
  enabled: true
  # Omit data_dir to store M-flow data inside each workspace at `workspace_dir/mflow_data`.
  # Defaults to the current workspace directory name when omitted.
  dataset_name: "workspace"
  # Defaults to providers.default_primary when omitted.
  llm_provider_name: "qwen"
  embedding:
    # Reuse an existing provider's api_key/base_url, then override the model.
    provider_name: "qwen"
    model: "text-embedding-v4"
    # DashScope text-embedding-v4 defaults to 1024 dims and allows at most 10
    # inputs per batch. If you change dimensions later, rebuild the corresponding
    # workspace's `mflow_data/` to avoid vector-schema mismatches.
    dimensions: 1024
    batch_size: 10
    # Optional explicit overrides:
    # api_key_env: "DASHSCOPE_API_KEY"
    # base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    # dimensions: 1024
    # batch_size: 10

channels:
  instances:
    - name: "feishu-main"
      type: "feishu"
      workspace_dir: "../workspace-main"
      app_id_env: "FEISHU_MAIN_APP_ID"
      app_secret_env: "FEISHU_MAIN_APP_SECRET"

    - name: "feishu-ops"
      type: "feishu"
      workspace_dir: "../workspace-ops"
      app_id_env: "FEISHU_MIN_APP_ID"
      app_secret_env: "FEISHU_MIN_APP_SECRET"
