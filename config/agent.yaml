agent:
  name: "Yi Min"
  workspace_dir: "../workspace"
  max_iterations: 8

providers:
  config_file: "providers.yaml"
  default_primary: "qwen"

tools:
  shell:
    enabled: true
    requires_confirmation: true

observability:
  langfuse:
    enabled: true
    public_key_env: "LANGFUSE_PUBLIC_KEY"
    secret_key_env: "LANGFUSE_SECRET_KEY"
    base_url: "http://192.169.26.221:3000"
    capture_inputs: true
    capture_outputs: true
    capture_tool_args: true
    capture_tool_results: true
    capture_reasoning: "metadata"
    max_field_chars: 12000
    sample_rate: 1.0
    timeout_seconds: 15
    flush_interval_seconds: 2
    flush_at: 32
    flush_on_run_end: false

# Optional M-flow runtime config.
# If omitted, M-flow still tries to use the primary provider for LLM,
# but embedding should be configured explicitly for production use.
#
mflow:
  enabled: false
  # Omit data_dir to store M-flow data inside each workspace at `workspace_dir/mflow_data`.
  # Defaults to the current workspace directory name when omitted.
  dataset_name: "workspace"
  # Defaults to providers.default_primary when omitted.
  llm_provider_name: "qwen"
  embedding:
    # Reuse an existing provider's api_key/base_url, then override the model.
    provider_name: "qwen"
    model: "text-embedding-v4"
    # DashScope text-embedding-v4 defaults to 1024 dims and allows at most 10
    # inputs per batch. If you change dimensions later, rebuild the corresponding
    # workspace's `mflow_data/` to avoid vector-schema mismatches.
    dimensions: 1024
    batch_size: 10
    # Optional explicit overrides:
    # api_key_env: "DASHSCOPE_API_KEY"
    # base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    # dimensions: 1024
    # batch_size: 10

channels:
  instances:
    - name: "feishu"
      type: "feishu"
      workspace_dir: "../workspace"
      app_id_env: "FEISHU_APP_ID"
      app_secret_env: "FEISHU_APP_SECRET"
