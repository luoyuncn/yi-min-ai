providers:
  - name: "claude-sonnet"
    type: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"

  # OpenAI 兼容示例 —— 取消注释并按需修改后即可启用。
  # 支持 OpenAI、DeepSeek、Ollama、vLLM 等任何兼容 OpenAI Chat Completions 的服务。
  #
  - name: "gpt-5"
    type: "openai"
    model: "gpt-5.4"
    api_key_env: "OPENAI_API_KEY"
    # 以下公共参数均为可选项，可由工厂统一透传。
    # temperature: 0.2
    # top_p: 0.9
    # max_output_tokens: 4096
    # 自定义 OpenAI 兼容网关通常需要带 `/v1`
    # provider 代码会对 bare host 自动补 `/v1`，这里仍显式写出以减少歧义
    base_url: "http://142.171.209.142:8888/v1"
  #
  - name: "qwen"
    type: "openai"
    model: "qwen3.6-plus"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    # Qwen3.6-Plus 在百炼默认开启思考模式；这里显式关闭。
    extra_body:
      enable_thinking: false
  # Deepseek
  - name: "deepseek"
    type: "openai"
    model: "deepseek-v4-pro"
    api_key_env: "DEEPSEEK_API_KEY"
    base_url: "https://api.deepseek.com/v1"
    extra_body:
      thinking:
        type: disabled
